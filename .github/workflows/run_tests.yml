name: Run Tests

on:
  pull_request:
    branches: ["main"]

env:
  FRONTEND_URL: "http://localhost:5173"
  DATABASE_URL: "mysql+pymysql://user:user_password@127.0.0.1:3306/sisprae_db"
  PYTHONPATH: src

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      mailcatcher:
        image: sj26/mailcatcher:latest
        ports:
          - 1025:1025
          - 1080:1080

      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sisprae_db
          MYSQL_USER: user
          MYSQL_PASSWORD: user_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Initialize Database Schema
        run: mysql -h 127.0.0.1 -P 3306 -u user -puser_password sisprae_db < scripts/init.sql

      - name: Seed Database Fixed Values
        working-directory: backend
        run: poetry run python -m scripts.seed_database_fixed_values

      - name: Run tests
        env:
          PYTHONPATH: src
        run: poetry run pytest -q

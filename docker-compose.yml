services:
  db:
    image: mysql:8.0
    container_name: sisprae-db
    restart: always
    environment:
      MYSQL_DATABASE: sisprae_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
      build: ./backend
      container_name: sisprae-backend
      volumes:
        - ./backend:/app
      ports:
        - "8000:8000"
      environment:
        - DATABASE_URL=mysql+pymysql://user:user_password@db/sisprae_db
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
        - PYTHONPATH=/app:/app/src
        - SMTP_HOST=${SMTP_HOST}
        - SMTP_PORT=${SMTP_PORT}
        - SMTP_USER=${SMTP_USER}
        - SMTP_PASSWORD=${SMTP_PASSWORD}
        - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      depends_on:
        - db
        - mailcatcher

  frontend:
    build: ./frontend
    container_name: sisprae-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  mailcatcher:
      image: sj26/mailcatcher:latest
      container_name: sisprae-mailcatcher
      ports:
        - "1080:1080"
        - "1025:1025"

volumes:
  mysql_data:
